# ─────────────────────────────────────────────────────────────
# FlowShield — Render Blueprint (Infrastructure as Code)
# Deploy the entire stack with one click:
#   1. Push this repo to GitHub/GitLab
#   2. In Render Dashboard → Blueprint → Connect repo
#   3. Render provisions all services automatically
# ─────────────────────────────────────────────────────────────

# ── Managed PostgreSQL ──────────────────────────────────────
databases:
  - name: flowshield-db
    databaseName: flowshield
    user: flowshield
    plan: free              # Upgrade to 'starter' or 'pro' for production
    ipAllowList: []         # Use private network only (recommended)

# ── Services ────────────────────────────────────────────────
services:

  # ── Managed Redis (Key Value Store) ────────────────────────
  - type: keyvalue
    name: flowshield-redis
    plan: free              # Upgrade to 'starter-256' or higher for production

  # ── Backend API (Docker-based Web Service) ──────────────────
  - type: web
    name: flowshield-api
    runtime: docker
    repo: https://github.com/BeastVJ/FlowShield.git
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: flowshield-db
          property: connectionString
      # REDIS_URL is the full redis:// connection string that ioredis accepts
      - key: REDIS_URL
        fromKey:
          name: flowshield-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        fromService:
          name: flowshield-frontend
          type: static
          property: url
      - key: FRONTEND_URL
        fromService:
          name: flowshield-frontend
          type: static
          property: url

  # ── Frontend Dashboard (Static Site) ────────────────────────
  - type: static
    name: flowshield-frontend
    repo: https://github.com/yourusername/flowshield   # 🔁 Replace with your repo URL
    branch: main
    buildCommand: cd packages/frontend && npm ci && npm run build
    publishPath: packages/frontend/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    envVars:
      - key: VITE_API_URL
        fromService:
          name: flowshield-api
          type: web
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
