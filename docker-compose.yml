version: '3.8'

services:
  # ── PostgreSQL ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: flowshield-postgres
    environment:
      POSTGRES_DB: flowshield
      POSTGRES_USER: flowshield
      POSTGRES_PASSWORD: flowshield_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowshield"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: flowshield-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ─────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowshield-api
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://flowshield:flowshield_password@postgres:5432/flowshield
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: change-this-in-production-use-a-real-secret
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx Reverse Proxy ────────────────────────
  nginx:
    image: nginx:alpine
    container_name: flowshield-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

  # ── Prometheus ──────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: flowshield-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  # ── Grafana ─────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: flowshield-grafana
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
